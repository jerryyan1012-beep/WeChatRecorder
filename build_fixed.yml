name: Build WeChatRecorder

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 PyQt6-Qt6 pyaudio sounddevice soundfile numpy psutil pyinstaller
    
    - name: Build EXE with all PyQt6
      run: |
        pyinstaller --onefile --console --name WeChatRecorder --collect-all PyQt6 --collect-all PyQt6-Qt6 main_gui.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WeChatRecorder-EXE
        path: dist/WeChatRecorder.exe
