name: Build WeChatRecorder

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.2)'
        required: false
        default: '1.0.2'

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6==6.6.1 PyQt6-Qt6==6.6.1 pyaudio sounddevice soundfile numpy psutil pyinstaller
    
    - name: Build EXE
      run: |
        # 创建图标文件（使用 PowerShell 和 .NET）
        $iconPath = "assets/icon.ico"
        if (-not (Test-Path $iconPath)) {
          # 创建简单的图标
          Add-Type -AssemblyName System.Drawing
          $bitmap = New-Object System.Drawing.Bitmap(256, 256)
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.Clear([System.Drawing.Color]::FromArgb(59, 130, 246))
          $graphics.FillEllipse([System.Drawing.Brushes]::White, 103, 60, 50, 50)
          $graphics.FillRoundedRectangle([System.Drawing.Brushes]::White, 108, 110, 40, 80, 10)
          $graphics.FillRoundedRectangle([System.Drawing.Brushes]::White, 88, 200, 80, 20, 5)
          $graphics.Dispose()
          $icon = [System.Drawing.Icon]::FromHandle($bitmap.GetHicon())
          $stream = [System.IO.FileStream]::new($iconPath, [System.IO.FileMode]::Create)
          $icon.Save($stream)
          $stream.Close()
          $icon.Dispose()
          $bitmap.Dispose()
        }
        
        # 构建带有版本信息和图标的 EXE
        pyinstaller --onefile --windowed --name WeChatRecorder `
          --icon="assets/icon.ico" `
          --version-file="assets/version_info.txt" `
          --collect-all PyQt6 --collect-all PyQt6-Qt6 main_gui.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WeChatRecorder-EXE
        path: dist/WeChatRecorder.exe
