name: Build WeChatRecorder

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.2)'
        required: false
        default: '1.0.2'

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6==6.6.1 PyQt6-Qt6==6.6.1 pyaudio sounddevice soundfile numpy psutil pyinstaller
    
    - name: Build with spec file
      run: |
        pyinstaller WeChatRecorder.spec
    
    - name: Check built files
      shell: cmd
      run: |
        dir dist\
        echo "Build complete"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WeChatRecorder-EXE
        path: dist/WeChatRecorder.exe
