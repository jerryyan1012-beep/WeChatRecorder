name: Build WeChatRecorder

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.2)'
        required: false
        default: '1.0.2'

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6==6.6.1 PyQt6-Qt6==6.6.1 pyaudio sounddevice soundfile numpy psutil pyinstaller
    
    - name: Create spec file with audio support
      shell: python
      run: |
        spec_content = """# -*- mode: python ; coding: utf-8 -*-
import sys
import os
import pyaudio
import sounddevice
import soundfile

block_cipher = None

# 获取库路径
pyaudio_dir = os.path.dirname(pyaudio.__file__)
sounddevice_dir = os.path.dirname(sounddevice.__file__)
soundfile_dir = os.path.dirname(soundfile.__file__)

print(f"PyAudio dir: {pyaudio_dir}")
print(f"Sounddevice dir: {sounddevice_dir}")
print(f"Soundfile dir: {soundfile_dir}")

# 收集二进制文件
binaries = []

# PyAudio binaries
if os.path.exists(pyaudio_dir):
    for f in os.listdir(pyaudio_dir):
        if f.endswith('.pyd') or f.endswith('.dll'):
            binaries.append((os.path.join(pyaudio_dir, f), '.'))
            print(f"Adding PyAudio binary: {f}")

# Sounddevice binaries (portaudio)
sounddevice_data = os.path.join(sounddevice_dir, '_sounddevice_data')
if os.path.exists(sounddevice_data):
    for root, dirs, files in os.walk(sounddevice_data):
        for f in files:
            if f.endswith('.dll') or f.endswith('.pyd'):
                src = os.path.join(root, f)
                rel_path = os.path.relpath(root, sounddevice_dir)
                binaries.append((src, rel_path))
                print(f"Adding Sounddevice binary: {src} -> {rel_path}")

# Soundfile binaries
if os.path.exists(soundfile_dir):
    for f in os.listdir(soundfile_dir):
        if f.endswith('.dll') or f.endswith('.pyd') or 'libsndfile' in f.lower():
            binaries.append((os.path.join(soundfile_dir, f), '.'))
            print(f"Adding Soundfile binary: {f}")

a = Analysis(
    ['main_gui.py'],
    pathex=[],
    binaries=binaries,
    datas=[],
    hiddenimports=[
        'pyaudio',
        'sounddevice',
        'soundfile',
        'numpy',
        'numpy.core._dtype_ctypes',
        'psutil',
        'PyQt6',
        'PyQt6.QtCore',
        'PyQt6.QtGui',
        'PyQt6.QtWidgets',
    ],
    hookspath=[],
    hooksconfig={},
    runtime_hooks=[],
    excludes=[],
    win_no_prefer_redirects=False,
    win_private_assemblies=False,
    cipher=block_cipher,
    noarchive=False,
)

pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)

exe = EXE(
    pyz,
    a.scripts,
    a.binaries,
    a.zipfiles,
    a.datas,
    [],
    name='WeChatRecorder',
    debug=False,
    bootloader_ignore_signals=False,
    strip=False,
    upx=True,
    upx_exclude=[],
    runtime_tmpdir=None,
    console=True,
    disable_windowed_traceback=False,
    argv_emulation=False,
    target_arch=None,
    codesign_identity=None,
    entitlements_file=None,
)
"""
        with open('WeChatRecorder.spec', 'w') as f:
            f.write(spec_content)
        print("Created WeChatRecorder.spec")
    
    - name: Build with spec file
      run: |
        python -m PyInstaller WeChatRecorder.spec
    
    - name: Check built files
      shell: cmd
      run: |
        dir dist\
        echo "Build complete"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WeChatRecorder-EXE
        path: dist/WeChatRecorder.exe
