name: Build WeChatRecorder

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.2)'
        required: false
        default: '1.0.2'

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6==6.6.1 PyQt6-Qt6==6.6.1 pyaudio sounddevice soundfile numpy psutil pyinstaller
    
    - name: Build EXE
      run: |
        # 确保资源目录存在
        if (-not (Test-Path "assets")) {
          New-Item -ItemType Directory -Path "assets" -Force
        }
        
        # 构建带有版本信息的 EXE
        pyinstaller --onefile --windowed --name WeChatRecorder `
          --version-file="assets/version_info.txt" `
          --collect-all PyQt6 --collect-all PyQt6-Qt6 --collect-all sounddevice main_gui.py
      shell: pwsh
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WeChatRecorder-EXE
        path: dist/WeChatRecorder.exe
    
    - name: Upload to Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.2
        files: dist/WeChatRecorder.exe
        body: |
          WeChatRecorder v1.0.2
          
          修复内容:
          - 修复录制多次后崩溃的问题
          - 修复WASAPI Loopback录音
          - 添加详细日志输出
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
