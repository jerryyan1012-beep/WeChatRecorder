name: Build WeChatRecorder

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        default: '1.0.0'

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install -r requirements.txt pyinstaller
    - run: pyinstaller --onefile --windowed --name WeChatRecorder main_gui.py
    - uses: actions/upload-artifact@v4
      with:
        name: WeChatRecorder-EXE
        path: dist/WeChatRecorder.exe
